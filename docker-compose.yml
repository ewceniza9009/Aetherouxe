version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: elite-postgres
    environment:
      POSTGRES_USER: elite
      POSTGRES_PASSWORD: elite123
      POSTGRES_DB: elite_realty
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elite -d elite_realty"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: elite-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: elite
      MONGO_INITDB_ROOT_PASSWORD: elite123
      MONGO_INITDB_DATABASE: elite_realty
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: elite-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: elite-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile.unified
    image: elite-realty:latest
    container_name: elite-app
    ports:
      - "8080:80"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: "postgresql://elite:elite123@postgres:5432/elite_realty?schema=public"
      MONGODB_URI: "mongodb://elite:elite123@mongodb:27017/elite_realty?authSource=admin"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "dev-secret-change-me"
      JWT_REFRESH_SECRET: "dev-refresh-secret-change-me"
      JWT_ACCESS_TOKEN_EXPIRES_IN: "15m"
      JWT_REFRESH_TOKEN_EXPIRES_IN: "7d"
      S3_ENDPOINT: "http://minio:9000"
      S3_REGION: "us-east-1"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_BUCKET: "elite-realty"
      DEFAULT_TENANT_DOMAIN: "localhost"
      PORT: "4000"
      ALLOWED_ORIGINS: "http://admin.localhost:8080,http://owner.localhost:8080,http://resident.localhost:8080,http://api.localhost:8080,http://localhost:8080,http://admin.localhost,http://owner.localhost,http://resident.localhost,http://api.localhost,http://localhost:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 60s

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  minio-data:
