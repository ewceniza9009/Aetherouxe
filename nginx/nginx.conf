worker_processes 1;
events { worker_connections 1024; }

http {
  upstream api_up { server api:4000; }
  upstream admin_up { server admin-web:4173; }
  upstream owner_up { server owner-web:4173; }
  upstream resident_up { server resident-web:4173; }

  # API + Swagger docs
  server {
    listen 80;
    server_name api.localhost;
    location /api/ { proxy_pass http://api_up; }
    location /docs { proxy_pass http://api_up; }
    location / { proxy_pass http://api_up; }
  }

  # Admin portal
  server {
    listen 80;
    server_name admin.localhost;
    location /api/ { proxy_pass http://api_up; }
    location / { proxy_pass http://admin_up; }
  }

  # Owner / Investor portal
  server {
    listen 80;
    server_name owner.localhost;
    location /api/ { proxy_pass http://api_up; }
    location / { proxy_pass http://owner_up; }
  }

  # Resident portal
  server {
    listen 80;
    server_name resident.localhost;
    location /api/ { proxy_pass http://api_up; }
    location / { proxy_pass http://resident_up; }
  }
}
